version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - gofmt
    - unused
    - gocritic
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: true
  gosec:
    excludes:
      - G304  # file inclusion via variable — intentional in library loader
  gocritic:
    disabled-checks:
      - commentedOutCode

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - gosec
        - errcheck
